# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and upload release to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    # Required for PyPI Trusted Publisher (OIDC)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Inject Git Sources for Build
        run: |
          uv add "camouchat-core @ git+https://github.com/CamouChat-Team/camouchat-core@main"
          uv add "camouchat-browser @ git+https://github.com/CamouChat-Team/camouchat-browser@main"

      - name: Build distributions
        run: uv build --package camouchat-whatsapp

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
