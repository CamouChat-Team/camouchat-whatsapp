name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master", "dev"]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Inject Git Sources for Standalone Build
        run: |
          uv add "camouchat-core @ git+https://github.com/CamouChat-Team/camouchat-core@dev"
          uv add "camouchat-browser @ git+https://github.com/CamouChat-Team/camouchat-browser@dev"

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Install Playwright Browsers
        run: uv run playwright install chromium

      - name: Run Ruff (Linter)
        run: uv run ruff check src tests

      - name: Run Ruff (Formatter Check)
        run: uv run ruff format --check src tests

      - name: Run Mypy (Type Checker)
        run: uv run mypy src tests

      - name: Run deptry (Dependency Checker)
        run: uv run deptry .

  test:
    needs: lint-and-typecheck
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Inject Git Sources for Standalone Build
        run: |
          uv add "camouchat-core @ git+https://github.com/CamouChat-Team/camouchat-core@dev"
          uv add "camouchat-browser @ git+https://github.com/CamouChat-Team/camouchat-browser@dev"

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Install Playwright Browsers
        run: uv run playwright install --with-deps

      - name: Run Tests with Coverage
        run: uv run pytest tests/ --cov=camouchat_whatsapp --cov-report=xml -v

      - name: Upload Coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
